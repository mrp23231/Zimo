name: Firebase Cron

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/2 * * * *"

jobs:
  cron:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: functions
        run: npm install --no-audit --no-fund

      - name: Run cron
        working-directory: functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/functions/serviceAccount.json
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" > serviceAccount.json
          npm run cron
          rm -f serviceAccount.json
